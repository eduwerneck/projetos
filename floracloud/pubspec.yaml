name: floracloud
description: "FloraCloud - Mapeamento 3D de Vegetação com SfM e VARI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.6.2

  # HTTP & API
  dio: ^5.7.0

  # Camera & media
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Location / GPS
  geolocator: ^13.0.2

  # Storage
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  sqflite: ^2.4.1

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0

  # File handling
  path: ^1.9.0
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
