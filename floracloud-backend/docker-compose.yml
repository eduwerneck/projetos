version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /data/floracloud
    volumes:
      - floracloud_data:/data/floracloud
    depends_on:
      - redis
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /data/floracloud
    volumes:
      - floracloud_data:/data/floracloud
      # Cache HuggingFace models between restarts
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - redis
    restart: unless-stopped
    # concurrency=1: pipeline is CPU/GPU bound; one job at a time
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=1

volumes:
  redis_data:
  floracloud_data:
  hf_cache:
